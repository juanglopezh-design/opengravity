<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ContentFlow AI</title>
  <desc id="desc">Genera contenido viral en 10 segundos con inteligencia artificial.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b14"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="80" r="220" fill="#8b5cf6" opacity="0.18"/>
  <circle cx="180" cy="520" r="260" fill="#06b6d4" opacity="0.16"/>
  <rect x="80" y="84" width="1040" height="462" rx="34" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="120" y="170" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">⚡ ContentFlow AI</text>
  <text x="120" y="300" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">Contenido viral</text>
  <text x="120" y="390" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">en 10 segundos</text>
  <text x="120" y="470" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">Posts, emails y blogs listos para publicar con IA.</text>
</svg>
