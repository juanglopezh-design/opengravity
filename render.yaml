services:
  - type: worker
    name: opengravity
    env: node
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: FORCE_REDEPLOY
        value: "2026-03-08T14:30:00Z"
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
